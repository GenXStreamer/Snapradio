<!doctype html>
<html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mixcloud to MP3</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/dataTables.bootstrap5.min.css">
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/dataTables.bootstrap5.min.js"></script>
    <link href="{{ url_for('static', filename='css/styles.css') }}" rel="stylesheet" />
    <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png">
    <link rel="manifest" href="/static/site.webmanifest">
</head>

<body class="container py-4">

        <div class="tab-container">
                <div class="tab"> <a href="/">Radio Streams</a></div>
                <div class="tab"> <a href="/twitch">Twitch Streams</a></div>
                <div class="tab active"> <a href="/mixcloud">Mixcloud Downloader</a></div>
        </div>
<br>

    <h1>Mixcloud Downloader</h1>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div style="color:red;">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    <form method="post" onsubmit="showWorkingBox()">
        <label>Mixcloud URL:</label><br>
        <input name="url" style="width:500px;" required><br><br>
        <button type="submit">Download</button>
    </form>
      <div id="working-box">
	              <div class="spinner"></div>
        Working... Please wait.
    </div>

    <script>
	   function showWorkingBox() {
            document.getElementById('working-box').style.display = 'block';
        }
    </script>
</body>
</html>
