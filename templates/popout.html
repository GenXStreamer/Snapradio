<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pop-out Player: {{ name }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background-color: #1a1a1a; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .player-card { padding: 20px; border-radius: 12px; background: #2d2d2d; box-shadow: 0 8px 24px rgba(0,0,0,0.5); width: 90%; max-width: 400px; }
        .station-logo { width: 90px; height: 90px; object-fit: contain; border-radius: 8px; margin-bottom: 15px; background: #fff; padding: 5px; }
        audio { width: 100%; margin-top: 15px; }
    </style>
</head>
<body>

<div class="player-card">
    {% if img %}
        <img src="/static/logos/{{ img }}" class="station-logo" alt="{{ name }} Logo">
    {% else %}
        <div class="station-logo d-inline-flex align-items-center justify-content-center bg-secondary text-white font-weight-bold fs-3">📻</div>
    {% endif %}
    
    <h4 class="mb-1 text-truncate">{{ name }}</h4>
    <p class="text-muted small mb-3 text-truncate">{{ category }}</p>
    
    <audio id="audioPlayer" controls autoplay></audio>
    
    <div id="statusMessage" class="small text-warning mt-2">Connecting to server audio pipeline...</div>
</div>

<script>
    const initialUrl = "{{ stream_url | safe }}";
    const audio = document.getElementById('audioPlayer');
    const statusMsg = document.getElementById('statusMessage');

    // Query our new backend resolver proxy to parse out text playlists safely
    fetch('/radio/resolve_stream?url=' + encodeURIComponent(initialUrl))
        .then(response => response.json())
        .then(data => {
            const resolvedUrl = data.url;
            if (!resolvedUrl) {
                statusMsg.textContent = "Error: Stream destination could not be found.";
                return;
            }

            console.log("Connecting browser to stream target:", resolvedUrl);
            statusMsg.style.display = 'none';

            // Route dynamically: Use HLS framework if the resolved stream link maps an m3u8 playlist chunk manifest
            if (resolvedUrl.toLowerCase().includes('.m3u8')) {
                if (Hls.isSupported()) {
                    statusMsg.style.display = 'block';
                    statusMsg.textContent = "Initializing HLS Stream Pipeline...";
                    
                    const hls = new Hls({ maxLiveSyncPlaybackRate: 1.5, enableWorker: true });
                    hls.loadSource(resolvedUrl);
                    hls.attachMedia(audio);
                    hls.on(Hls.Events.MANIFEST_PARSED, function() {
                        statusMsg.style.display = 'none';
                        audio.play().catch(e => console.log("Interactivity warning: Playback gesture expected.", e));
                    });
                } else if (audio.canPlayType('application/vnd.apple.mpegurl')) {
                    audio.src = resolvedUrl;
                }
            } else {
                // Route dynamically: Direct play layout parameters for Icecast / Shoutcast raw chunk payloads
                audio.src = resolvedUrl;
                audio.play().catch(e => console.log("Interactivity warning: Playback gesture expected.", e));
            }
        })
        .catch(err => {
            console.error("Resolution connection failed:", err);
            statusMsg.textContent = "Network error while resolving radio stream source.";
        });
</script>

</body>
</html>
